name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve GitHub Pages URL and base path
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "SITE_URL=https://${OWNER}.github.io" >> $GITHUB_ENV
          if [[ "$REPO" == "${OWNER}.github.io" ]]; then
            echo "BASE_PATH=/" >> $GITHUB_ENV
          else
            echo "BASE_PATH=/${REPO}" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait and retry if first attempt failed
        if: steps.deploy1.outcome == 'failure'
        run: |
          echo "First attempt failed — waiting 30s..."
          sleep 30

      - name: Retry deploy
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
